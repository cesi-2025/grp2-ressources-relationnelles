<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 300 300">
  <!-- Fond bleu avec coins arrondis -->
  <rect x="0" y="0" width="300" height="300" rx="40" ry="40" fill="#0A2A66" />

  <!-- Figures humaines -->
  <!-- Figure gauche (verte) -->
  <circle cx="90" cy="100" r="20" fill="#4CAF50" />
  <path d="M70 160 Q90 140 110 160" stroke="#4CAF50" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Figure droite (verte) -->
  <circle cx="210" cy="100" r="20" fill="#4CAF50" />
  <path d="M190 160 Q210 140 230 160" stroke="#4CAF50" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Figure centrale (bleue) -->
  <circle cx="150" cy="70" r="20" fill="#2196F3" />
  <path d="M130 130 Q150 110 170 130" stroke="#2196F3" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Texte -->
  <text x="50%" y="240" fill="#FFFFFF" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">
    RESSOURCE
  </text>
  <text x="50%" y="270" fill="#FFFFFF" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">
    RELATIONNEL
  </text>
</svg>