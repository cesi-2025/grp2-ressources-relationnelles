services:
  db:
    image: postgres:16-alpine
    container_name: rr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ressources_relationnelles}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ressources_relationnelles}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db_admin:
    image: adminer:4
    container_name: rr_db_admin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DB_ADMIN_PORT:-8080}:8080"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rr_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-ressources_relationnelles}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:19006,http://127.0.0.1:19006,http://localhost:8081,http://127.0.0.1:8081,exp://127.0.0.1:19000,exp://localhost:19000}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -lc "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if [ ! -f vendor/autoload.php ]; then composer install; fi &&
      php artisan key:generate --force &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    image: node:22-alpine
    container_name: rr_web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - pnpm_store:/pnpm/store
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    command: >
      sh -lc "
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "${WEB_PORT}:3000"

volumes:
  pg_data:
  pnpm_store:
