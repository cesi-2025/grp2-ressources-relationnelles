name: CI

# Lance les tests automatiquement sur les branches principales et sur chaque PR qui les vise.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Annule un run précédent encore en cours sur la même branche/PR (économise des minutes CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # API — Laravel 12 / PHP 8.2 — PHPUnit sur SQLite en mémoire (aucun service externe requis)
  # ---------------------------------------------------------------------------
  api:
    name: API (Laravel · PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # WEB — Next.js 16 / Vitest
  # ---------------------------------------------------------------------------
  web:
    name: Web (Next.js · Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter web run test

      - name: Lint
        run: pnpm --filter web run lint
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # MOBILE — Expo / React Native / Jest
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile (Expo · Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter mobile run test
